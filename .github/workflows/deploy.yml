name: Deploy CPS230 Solution

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: '20.x'

jobs:
  # Build and test backend
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run backend tests
        working-directory: backend
        run: npm test
        continue-on-error: true

      - name: Copy VERSION file into backend package
        run: cp VERSION backend/VERSION

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-functions
          path: |
            backend/dist
            backend/node_modules
            backend/package.json
            backend/host.json
            backend/VERSION

  # Build frontend
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist

  # Deploy infrastructure
  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Infrastructure
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: australiaeast
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          template: ./infrastructure/main.bicep
          parameters: >
            environmentName=${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
            baseName=cps230
            postgresAdminPassword=${{ secrets.POSTGRES_ADMIN_PASSWORD }}
            initialAdminEmail=${{ secrets.INITIAL_ADMIN_EMAIL }}
            githubRepositoryUrl=${{ github.server_url }}/${{ github.repository }}
          deploymentName: cps230-${{ github.run_number }}

  # Deploy backend functions
  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-functions
          path: backend

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: backend

  # Deploy frontend
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/'
          output_location: 'dist'
          skip_app_build: true

  # Apply database migrations (runs on every deploy)
  run-migrations:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create migrations tracking table
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          psql -h "${{ secrets.POSTGRES_HOST }}" \
               -U "${{ secrets.POSTGRES_USER }}" \
               -d "${{ secrets.POSTGRES_DB }}" \
               -c "CREATE TABLE IF NOT EXISTS public.schema_migrations (
                     version VARCHAR(255) PRIMARY KEY,
                     applied_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
                   );"

      - name: Apply pending migrations
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          PGHOST="${{ secrets.POSTGRES_HOST }}"
          PGUSER="${{ secrets.POSTGRES_USER }}"
          PGDB="${{ secrets.POSTGRES_DB }}"
          MIGRATIONS_APPLIED=0

          for migration in database/migrations/*.sql; do
            if [ -f "$migration" ]; then
              MIGRATION_NAME=$(basename "$migration" .sql)

              APPLIED=$(psql -h "$PGHOST" -U "$PGUSER" -d "$PGDB" -tAc \
                "SELECT EXISTS (SELECT 1 FROM schema_migrations WHERE version = '$MIGRATION_NAME');")

              if [ "$APPLIED" = "f" ]; then
                echo "Applying migration: $MIGRATION_NAME"
                psql -h "$PGHOST" -U "$PGUSER" -d "$PGDB" -f "$migration"
                psql -h "$PGHOST" -U "$PGUSER" -d "$PGDB" -c \
                  "INSERT INTO schema_migrations (version) VALUES ('$MIGRATION_NAME');"
                echo "Migration $MIGRATION_NAME applied successfully"
                MIGRATIONS_APPLIED=$((MIGRATIONS_APPLIED + 1))
              else
                echo "Migration $MIGRATION_NAME already applied (skipping)"
              fi
            fi
          done

          echo "Migrations complete. $MIGRATIONS_APPLIED new migration(s) applied."

  # Initialize database (only on first deployment or when schema changes)
  initialize-database:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[init-db]')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Initialize Database
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          chmod +x database/init-database.sh
          ./database/init-database.sh
